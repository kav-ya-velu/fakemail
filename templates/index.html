<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spam Detector</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            background: white;
            padding: 40px;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 580px;
        }

        h1 {
            text-align: center;
            font-size: 26px;
            margin-bottom: 8px;
            color: #1a1a2e;
        }

        .subtitle {
            text-align: center;
            color: #666;
            font-size: 14px;
            margin-bottom: 30px;
        }

        textarea {
            width: 100%;
            padding: 14px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 15px;
            resize: vertical;
            min-height: 130px;
            outline: none;
            transition: border 0.3s;
            font-family: 'Segoe UI', sans-serif;
        }

        textarea:focus { border-color: #4f46e5; }

        button {
            width: 100%;
            padding: 14px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 14px;
            transition: background 0.3s;
        }

        button:hover { background: #4338ca; }

        .result {
            margin-top: 24px;
            padding: 20px;
            border-radius: 12px;
            text-align: center;
        }

        .result.spam {
            background: #fff0f0;
            border: 2px solid #ffcccc;
        }

        .result.ham {
            background: #f0fff4;
            border: 2px solid #b2f5c8;
        }

        .result-label {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 6px;
        }

        .result.spam .result-label { color: #e53e3e; }
        .result.ham  .result-label { color: #38a169; }

        .result-message {
            font-size: 13px;
            color: #555;
            word-break: break-word;
        }

        .emoji { font-size: 36px; margin-bottom: 8px; }
    </style>
</head>
<body>
<div class="container">
    <h1>📧 Spam Detector</h1>
    <p class="subtitle">Powered by SVM · Type any message to check</p>

    <form method="POST">
        <textarea
            name="message"
            placeholder="Type or paste a message here..."
            required
        >{{ message or '' }}</textarea>
        <button type="submit">🔍 Check Message</button>
    </form>

    {% if prediction %}
    <div class="result {{ prediction | lower }}">
        <div class="emoji">
            {% if prediction == 'SPAM' %}🚨{% else %}✅{% endif %}
        </div>
        <div class="result-label">{{ prediction }}</div>
        <div class="result-message">
            {% if prediction == 'SPAM' %}
                This message looks like spam!
            {% else %}
                This message looks legitimate.
            {% endif %}
        </div>
    </div>
    {% endif %}
</div>
</body>
</html>
